[ConsoleVariables]
; --- CRITICAL CRASH FIXES ---
; Disable RDG Async Compute to avoid conflicts with disabled Vulkan compute queues
r.RDGAsyncCompute=0
; Ensure breadcrumb allocation is disabled to prevent the RHI Segfault
r.GPUCrashDebugging=0
; Disable ray tracing dynamic enablement which was seen in logs
r.RayTracing=0

; --- PERFORMANCE & RESPONSIVENESS ---
r.ShaderDevelopmentMode=1
r.GTSyncType=1
r.Vulkan.WaitOnPresent=0
Slate.TickRate=120
Slate.SleepEvenIfUnfocused=0
Editor.Performance.ThrottleUnfocused=0

; --- DISPLAY ---
r.setres=1920x1200
t.MaxFPS.Editor=120
t.HoverEditorMaxFPS=60

; --- THREADING ---
TaskGraph.NumWorkerThreads=12
TaskGraph.HighPriorityThreads=4

; --- VISUAL QUALITY ---
r.AntiAliasingMethod=2
r.Editor.MovingGizmoTAA=1
r.Line.Thickness=1.5
